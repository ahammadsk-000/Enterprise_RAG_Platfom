# Staging overrides.
api:
  replicaCount: 1
  autoscaling:
    enabled: false
workers:
  - name: ingest
    queues: "default,ocr,parse,chunk,embed,index,graph,eval"
    replicaCount: 1
    resources:
      requests: { cpu: "250m", memory: "512Mi" }
      limits: { cpu: "1", memory: "1Gi" }
ingress:
  host: rag-staging.example.com
config:
  ENVIRONMENT: staging
  DEBUG: "true"
