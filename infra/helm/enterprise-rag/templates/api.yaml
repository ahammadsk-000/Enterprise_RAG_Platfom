apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-api
  labels: {{- include "enterprise-rag.labels" . | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "enterprise-rag.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["gunicorn", "app.main:app", "--worker-class", "uvicorn.workers.UvicornWorker",
                    "--workers", "4", "--bind", "0.0.0.0:{{ .Values.api.port }}", "--timeout", "120"]
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom: {{- include "enterprise-rag.envFrom" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /api/v1/readyz, port: {{ .Values.api.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/healthz, port: {{ .Values.api.port }} }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-api
  labels: {{- include "enterprise-rag.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - port: 80
      targetPort: {{ .Values.api.port }}
{{- if .Values.api.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-api
  labels: {{- include "enterprise-rag.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "enterprise-rag.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
