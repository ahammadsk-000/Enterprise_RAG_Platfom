apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-config
  labels: {{- include "enterprise-rag.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-secrets
  labels: {{- include "enterprise-rag.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "enterprise-rag.serviceAccountName" . }}
  labels: {{- include "enterprise-rag.labels" . | nindent 4 }}
{{- end }}
